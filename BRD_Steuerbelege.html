function splitCsvLine(line, delim) {
  const cols = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; } // "" = escaped quote inside field
      else inQ = !inQ;
    } else if (c === delim && !inQ) { cols.push(cur); cur = ''; }
    else cur += c;
  }
  cols.push(cur);
  return cols;
}

// Parse any date string into YYYY-MM-DD (handles German DD.MM.YYYY, US MM/DD/YYYY, ISO YYYY-MM-DD)
function parseAnyDate(s) {
  s = s.trim();
  // ISO: 2025-12-31
  let m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  // German: 31.12.2025
  m = /^(\d{1,2})\.(\d{1,2})\.(\d{4})$/.exec(s);
  if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  // US: 12/31/2025
  m = /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(s);
  if (m) return `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  return '';
}

// Parse amount string (German 1.234,56 OR English 1,234.56 / 1234.56 / -1234.56 / 1,000)
function parseAnyAmt(s) {
  s = s.trim().replace(/\s/g,'');
  if (!s || s === '-' || s === '+') return NaN;
  // German: 1.234,56 (period=thousands, comma=decimal)
  if (/\d+\.\d{3},\d{2}$/.test(s)) return parseFloat(s.replace(/\./g,'').replace(',','.'));
  // German no-thousands: 234,56
  if (/^[+\-]?\d+,\d{2}$/.test(s)) return parseFloat(s.replace(',','.'));
  // English with thousands: 1,234.56 or 7,748.73 (comma=thousands, period=decimal)
  if (/^[+\-]?\d{1,3}(,\d{3})+\.\d+$/.test(s)) return parseFloat(s.replace(/,/g,''));
  // English thousands no decimal: 1,000 or 1,095 or -5,672
  if (/^[+\-]?\d{1,3}(,\d{3})+$/.test(s)) return parseFloat(s.replace(/,/g,''));
  // English plain: 1234.56 or -1234.56 or 48.64
  if (/^[+\-]?\d+(\.\d+)?$/.test(s)) return parseFloat(s);
  return NaN;
}

// Nuclear CSV fallback: scans every line for a date + an amount regardless of column structure
function parseCsvNuclear(text) {
  const matched = [], all = [], seen = new Set();
  // Try both semicolon and comma as delimiter
  const delim = text.indexOf(';') !== -1 ? ';' : ',';
  const lines = text.replace(/\r/g,'').split('\n');
  for (const raw of lines) {
    const cols = raw.split(delim).map(c => c.replace(/^"|"$/g,'').trim());
    if (cols.length < 3) continue;
    // Find first column that looks like a date
    let date = '';
    for (const c of cols) {
      const d = parseAnyDate(c);
      if (d) { date = d; break; }
    }
    if (!date) continue;
    // Find last column that looks like a non-zero amount
    let amt = NaN;
    for (let ci = cols.length - 1; ci >= 0; ci--) {
      const v = parseAnyAmt(cols[ci]);
      if (!isNaN(v) && v !== 0) { amt = v; break; }
    }
    if (isNaN(amt) || amt === 0) continue;
    const key = `${date}|${amt}`;
    if (seen.has(key)) continue; seen.add(key);
    // Description from non-date, non-amount text columns
    const isDateCol = c => !!parseAnyDate(c);
    const isAmtCol  = c => !isNaN(parseAnyAmt(c)) && parseAnyAmt(c) !== 0;
    const desc = cols.filter(c => !isDateCol(c) && !isAmtCol(c) && c.length > 1)
                     .join(' ').substring(0, 200);
    const name = desc.substring(0, 60);
    const fullT = desc.toLowerCase();
    let detectedProp = null;
    for (const alias of PROP_ALIASES) { if (alias.pattern.test(fullT)) { detectedProp = alias; break; } }
    let taxResult = null;
    for (const rule of TAX_RULES) {
      if (rule.pattern.test(fullT)) {
        taxResult = {
          id: uid(), date, amt, name, desc,
          taxLabel: rule.label + (detectedProp ? ` · ${detectedProp.propName}` : ''),
          taxSectionId: detectedProp ? detectedProp.sectionId : rule.sectionId,
          taxTypeId:    detectedProp ? detectedProp.typeId    : rule.typeId,
          detectedPropName: detectedProp?.propName || null,
          needsReview: rule.needsReview && !detectedProp, accepted: true
        };
        break;
      }
    }
    if (taxResult) matched.push(taxResult);
    else all.push({ id: uid(), date, amt, name, desc, taxLabel: '—',
      taxSectionId: 'sonstiges', taxTypeId: 'sonstiges_allgemein',
      detectedPropName: null, needsReview: false, accepted: false });
  }
  return { matched, all };
}

function parseCsv(text) {
  const allLines = text.replace(/\r/g,'').split('\n');
  if (allLines.length < 2) return { matched: [], all: [] };

  // Find the real header row (skip bank metadata at top)
  let headerIdx = -1, delim = ';';
  for (let i = 0; i < Math.min(allLines.length, 20); i++) {
    const l = allLines[i].toLowerCase();
    // German OR English header keywords
    if (/buchungstag|wertstellung|umsatzart|buchungstext|booking.?date|transaction.?type|beneficiary/.test(l)) {
      headerIdx = i; delim = allLines[i].includes(';') ? ';' : ','; break;
    }
    if (/datum\b|value.?date/.test(l)) {
      headerIdx = i; delim = allLines[i].includes(';') ? ';' : ','; break;
    }
  }
  if (headerIdx === -1) {
    headerIdx = allLines.findIndex(l => l.trim().length > 0);
    delim = allLines[headerIdx]?.includes(';') ? ';' : ',';
  }

  const lines = allLines.slice(headerIdx).filter(l => l.trim());
  if (lines.length < 2) return { matched: [], all: [] };

  const header = lines[0].split(delim).map(h => h.replace(/^"|"$/g,'').trim().toLowerCase());

  let dateCol = -1, amtCol = -1, nameCol = -1, descCol = -1;
  let debitCol = -1, creditCol = -1;
  header.forEach((h, i) => {
    if (/buchungstag|booking.?date|datum\b|^date$|buchungsdat/.test(h) && dateCol === -1) dateCol = i;
    if (/^betrag$|^amount$|umsatzbetrag/.test(h)                      && amtCol  === -1) amtCol  = i;
    if (/^debit$|^soll$|belastung/.test(h)                            && debitCol === -1) debitCol = i;
    if (/^credit$|^haben$|gutschrift/.test(h)                         && creditCol === -1) creditCol = i;
    if (/beg.nstigter|auftraggeber|beneficiary|originator|payee|emp.nger|merchant/.test(h) && nameCol === -1) nameCol = i;
    if (/verwendungszweck|payment.?detail|payment.?ref|reference|purpose|description|details/.test(h) && descCol === -1) descCol = i;
  });
  // Prefer Debit/Credit columns over generic "amount" (DB CSV uses separate Debit & Credit cols)
  const hasDebitCredit = debitCol >= 0 || creditCol >= 0;
  if (hasDebitCredit) amtCol = -1; // force per-row debit/credit logic below
  // Positional fallback
  if (dateCol === -1) dateCol = 0;
  if (nameCol === -1) nameCol = header.length >= 4 ? 3 : -1;
  // If amtCol still not found by header name, detect by scanning data rows for amount-like values
  if (amtCol === -1) {
    outer: for (let ri = 1; ri < Math.min(lines.length, 8); ri++) {
      const tc = splitCsvLine(lines[ri], delim);
      for (let ci = tc.length - 1; ci >= 1; ci--) {
        const v = (tc[ci]||'').replace(/^"|"$/g,'').trim();
        if (/^[+\-]?\d{1,3}(?:\.\d{3})*,\d{2}$/.test(v) || /^[+\-]?\d+,\d{2}$/.test(v)) {
          amtCol = ci; break outer;
        }
      }
    }
  }
  // Hard positional last resort (DB classic: col 7, newer: col 8 or 11)
  if (amtCol === -1) amtCol = header.length >= 8 ? 7 : (header.length >= 7 ? 6 : header.length - 2);

  // Columns to SKIP when building search text (IBAN, BIC look like noise)
  const skipCols = new Set();
  header.forEach((h, i) => {
    if (/iban|bic\b|blz|kontonummer|gl.ubiger|mandats|kunden.referenz/.test(h)) skipCols.add(i);
  });
  skipCols.add(dateCol);   // don't match dates as keywords
  skipCols.add(amtCol);    // don't match amounts as keywords

  const matched = [], all = [];

  for (let i = 1; i < lines.length; i++) {
    const cols = splitCsvLine(lines[i], delim);
    if (cols.length < 2) continue;
    const get = idx => idx >= 0 && idx < cols.length ? (cols[idx]||'').replace(/^"|"$/g,'').trim() : '';

    // ── Amount ── (handles German 1.234,56 AND English 1,234.56)
    let amt = NaN;
    if (hasDebitCredit) {
      // Try Credit first (positive), then Debit (negative)
      const cr = parseAnyAmt(get(creditCol));
      const db = parseAnyAmt(get(debitCol));
      if (!isNaN(cr) && cr !== 0) amt = Math.abs(cr);
      else if (!isNaN(db) && db !== 0) amt = -Math.abs(db);
    }
    if (isNaN(amt) || amt === 0) amt = parseAnyAmt(get(amtCol));
    if (isNaN(amt) || amt === 0) continue;

    // ── Date ── (handles German DD.MM.YYYY, US MM/DD/YYYY, ISO YYYY-MM-DD)
    const date = parseAnyDate(get(dateCol));
    if (!date) continue;

    // ── Name & Description ──
    const name = get(nameCol);
    const extraDesc = descCol >= 0 ? get(descCol) : '';
    // Build desc from ALL non-skip, non-name text columns
    const descParts = cols
      .map((c, ci) => (skipCols.has(ci) || ci === nameCol) ? '' : c.replace(/^"|"$/g,'').trim())
      .filter(Boolean);
    const desc = [name, extraDesc, ...descParts.filter(p => p !== name && p !== extraDesc)]
      .filter(Boolean).join(' ').substring(0, 200);

    // ── Search text: name + transaction type + description ──
    const fullText = `${name} ${desc}`.toLowerCase();

    // ── Detect property ──
    let detectedProp = null;
    for (const alias of PROP_ALIASES) {
      if (alias.pattern.test(fullText)) { detectedProp = alias; break; }
    }

    // ── Apply TAX_RULES ──
    let taxResult = null;
    for (const rule of TAX_RULES) {
      if (rule.pattern.test(fullText)) {
        const sectionId = detectedProp ? detectedProp.sectionId : rule.sectionId;
        const typeId    = detectedProp ? detectedProp.typeId    : rule.typeId;
        const propNote  = detectedProp ? ` · ${detectedProp.propName}` : '';
        taxResult = {
          id: uid(), date, amt,
          name: name || desc.substring(0,60), desc,
          taxLabel: rule.label + propNote,
          taxSectionId: sectionId, taxTypeId: typeId,
          detectedPropId: detectedProp?.propId || null,
          detectedPropName: detectedProp?.propName || null,
          needsReview: rule.needsReview && !detectedProp,
          accepted: true
        };
        break;
      }
    }

    // Property name in notes but no keyword → still flag as relevant
    if (!taxResult && detectedProp) {
      taxResult = {
        id: uid(), date, amt,
        name: name || desc.substring(0,60), desc,
        taxLabel: `${detectedProp.propName} — Transaktion`,
        taxSectionId: detectedProp.sectionId, taxTypeId: detectedProp.typeId,
        detectedPropId: detectedProp.propId || null,
        detectedPropName: detectedProp.propName,
        needsReview: false, accepted: true
      };
    }

    if (taxResult) {
      matched.push(taxResult);
    } else {
      // Keep all transactions for manual review
      all.push({
        id: uid(), date, amt,
        name: name || desc.substring(0,60), desc,
        taxLabel: '—',
        taxSectionId: 'sonstiges', taxTypeId: 'sonstiges_allgemein',
        detectedPropName: null,
        needsReview: false, accepted: false
      });
    }
  }
  return { matched, all };
}

function setImportFormat(fmt) { importFormat = fmt; renderImport(); }

function setImportSource(src) {
  importSource = src;

}

function applyCsvResult(parsed) {
  const { matched, all } = parsed;
  if (matched.length > 0) {
    // Auto-detected items go first (checked), then all others (unchecked) for manual review
    importResults = [...matched, ...all];
    toast(`✅ ${matched.length} steuerrelevant erkannt · ${all.length} weitere zum Durchblättern`);
  } else if (all.length > 0) {
    // Nothing auto-detected — show ALL so user can pick manually
    importResults = all;
    toast(`ℹ️ Keine automatische Erkennung — ${all.length} Buchungen zum manuellen Auswählen`);
  } else {
    importResults = [];
    toast('⚠️ CSV konnte nicht gelesen werden — bitte Format prüfen');
  }
  renderImportResults();
}

function handleCsvImport(input) {
  const file = input.files[0];
  if (!file) return;
  const encoding = importSource === 'db' ? 'iso-8859-1' : 'utf-8';
  const tryParse = txt => {
    let r = parseCsv(txt);
    if (r.matched.length === 0 && r.all.length === 0) r = parseCsvNuclear(txt);
    return r;
  };
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const result1 = tryParse(e.target.result);
      if (result1.matched.length === 0 && result1.all.length === 0) {
        // Retry with opposite encoding
        const r2 = new FileReader();
        r2.onload = e2 => {
          try { applyCsvResult(tryParse(e2.target.result)); }
          catch(err) { toast('⚠️ Fehler beim Lesen der CSV-Datei'); }
        };
        r2.readAsText(file, encoding === 'iso-8859-1' ? 'utf-8' : 'iso-8859-1');
      } else {
        applyCsvResult(result1);
      }
    } catch(err) {
      toast('⚠️ Fehler beim Lesen der CSV-Datei');
    }
  };
  reader.readAsText(file, encoding);
  input.value = '';
}

/* ─── PDF IMPORT ─── */
async function handlePdfImport(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  toast('📄 PDF wird gelesen …');
  try {
    const arrayBuffer = await file.arrayBuffer();
    // Configure PDF.js worker
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const content = await page.getTextContent();
        // Group items by Y position (threshold 6px to handle DB's split DD.MM. / YYYY layout)
        let lastY = null;
        for (const item of content.items) {
          if (lastY !== null && Math.abs(item.transform[5] - lastY) > 6) {
            fullText += '\n';
          }
          fullText += item.str + ' ';
          lastY = item.transform[5];
        }
        fullText += '\n';
      }
      importResults = parsePdfBank(fullText);
      if (importResults.length === 0) {
        toast('⚠️ Keine steuerrelevanten Buchungen gefunden');
      } else {
        toast(`✅ ${importResults.length} steuerrelevante Buchungen gefunden`);
      }
      renderImportResults();
    } else {
      toast('⚠️ PDF-Bibliothek nicht geladen – bitte online öffnen');
    }
  } catch (err) {
    console.error('PDF import error:', err);
    toast('⚠️ Fehler beim Lesen der PDF-Datei');
  }
}

function parsePdfBank(text) {
  // Deutsche Bank PDF structure (confirmed from real PDF analysis):
  // - Dates appear as "01.04." on one Y-row, "2025" on the next
  // - SEPA transaction types ("SEPA Überweisung von", "SEPA Dauerauftrag an" etc.)
  //   are the ONLY reliable transaction boundary markers
  // - Payee name is on the line RIGHT AFTER the SEPA marker
  // - "Verwendungszweck/ Kundenreferenz" precedes the purpose/description line
  // - Amounts appear separately (right column) — not always adjacent to descriptions

  const txs = [];
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  // TX_RE matches the transaction type keyword anywhere in a line.
  // In DB PDFs, PDF.js groups the Buchung date, Valuta date, SEPA type and amount
  // all on ONE Y-row, so lines often look like:
  //   "03.01. 03.01. SEPA Dauerauftrag an - 255,71"
  // TX_RE must NOT have ^ anchor so it matches mid-line too.
  const TX_RE = /(SEPA\s+(?:Echtzeit(?:überweisung)?|Überweisung|Dauerauftrag|Lastschrift(?:einzug)?|Gutschrift|Einlastschrift)\s+(?:von|an)|ZINSEN\/DIVIDENDEN(?:\/\S+)?|Wertpapier(?:kauf|verkauf)|Kartenabrechnung|Barauszahlung|Scheckeinreichung)/i;

  // Track the most recent date seen as we scan
  let lastDate = `${currentYear}-01-01`;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // Update running date from ANY line that starts with DD.MM.
    // (covers date-only lines AND combined "03.01. 03.01. SEPA..." lines)
    const dateAtStart = /^(\d{2})\.(\d{2})\./.exec(line);
    if (dateAtStart && !/kontoauszug vom|bis |inhaber|neuer saldo/i.test(line)) {
      const d = dateAtStart[1], mo = dateAtStart[2];
      // Look for 4-digit year in the rest of this line or the next line
      const rem = line.substring(dateAtStart[0].length);
      const yrInLine = /\b(20\d{2})\b/.exec(rem);
      let yr = yrInLine ? yrInLine[1] : null;
      if (!yr) {
        const nextL = (lines[i+1] || '').trim();
        yr = /^\d{4}$/.test(nextL) ? nextL : String(currentYear);
      }
      lastDate = `${yr}-${mo}-${d}`;
      // If this line is ONLY a date (no SEPA content), skip further processing
      if (/^(\d{2})\.(\d{2})\.(\s*\d{4})?$/.test(line)) continue;
    }

    // ── Only continue for lines containing a transaction type keyword ──
    if (!TX_RE.test(line)) continue;

    // Extract the transaction type string from the line
    const txType = TX_RE.exec(line)[1];

    // Extract any INLINE amount from this line (Soll/Haben col on same Y row)
    // e.g. from "03.01. 03.01. SEPA Dauerauftrag an - 255,71"
    const INLINE_RE = /([+\-])\s*(\d{1,3}(?:\.\d{3})*,\d{2})/g;
    let inlineAmt = 0;
    for (const m of line.matchAll(INLINE_RE)) {
      inlineAmt = parseFloat((m[1]+m[2]).replace(/\./g,'').replace(',','.')); // keep last match
    }

    // ── Collect the block: following lines until next TX marker ──
    const blockLines = [line];
    let vzweck = '';
    let nextVZ = false;
    for (let j = i + 1; j < lines.length && j <= i + 12; j++) {
      const nl = lines[j];
      if (!nl || nl.length < 2) continue;
      if (TX_RE.test(nl) && nl !== line) break; // next transaction starts
      // Detect "Verwendungszweck/ Kundenreferenz" → next line is the purpose
      if (/^Verwendungszweck\//i.test(nl)) { nextVZ = true; continue; }
      if (nextVZ) { vzweck = nl; nextVZ = false; }
      blockLines.push(nl);
    }

    // ── Extract payee name ──
    // First non-IBAN/BIC/reference line after the SEPA marker
    let payee = '';
    for (let j = 1; j < blockLines.length; j++) {
      const bl = blockLines[j];
      if (!bl || bl.length < 2)                                   continue;
      if (/^DE\d{2}[\s\d]/.test(bl))                             continue; // IBAN
      if (/^[A-Z]{4}[A-Z0-9]{2}[A-Z0-9]{2,5}$/.test(bl))        continue; // BIC
      if (/^(IBAN|BIC|Gläubiger|Mand|RINP|RCUR|FRST|OOFF)/i.test(bl)) continue;
      if (/^[\d\s\.,\+\-\/]+$/.test(bl))                         continue; // only numbers
      payee = bl.replace(/\b\d{1,3}(?:\.\d{3})*,\d{2}\b/g, '').trim();
      if (payee.length >= 2) break;
    }
    if (!payee) payee = txType; // fallback to type text

    // ── Find amount ──
    const AMT_RE = /^([+\-])\s*(\d{1,3}(?:\.\d{3})*,\d{2})$/;
    // Start with inline amount found on the same Y-row as the SEPA marker
    let amt = inlineAmt;
    if (!amt) {
      // For dividends/Zinsen prefer the positive net credit over negative tax lines
      const isIncome = /ZINSEN|DIVIDENDEN|Gutschrift/i.test(txType);
      if (isIncome) {
        for (let k = i; k <= Math.min(lines.length - 1, i + 20); k++) {
          const m = AMT_RE.exec(lines[k]);
          if (m && m[1] === '+') { amt = parseFloat(('+'+m[2]).replace(/\./g,'').replace(',','.')); break; }
        }
      }
      // General forward search (any sign)
      if (!amt) {
        for (let k = i; k <= Math.min(lines.length - 1, i + 15); k++) {
          const m = AMT_RE.exec(lines[k]);
          if (m) { amt = parseFloat((m[1]+m[2]).replace(/\./g,'').replace(',','.')); break; }
        }
      }
      // Backward search (Haben amounts sometimes before descriptions)
      if (!amt) {
        for (let k = i - 1; k >= Math.max(0, i - 10); k--) {
          const m = AMT_RE.exec(lines[k]);
          if (m) { amt = parseFloat((m[1]+m[2]).replace(/\./g,'').replace(',','.')); break; }
        }
      }
      // Last resort: any number in block
      if (!amt) {
        const anyAmt = [...blockLines.join(' ').matchAll(/([+\-]?\s*\d{1,3}(?:\.\d{3})*,\d{2})/g)];
        if (anyAmt.length > 0) {
          amt = parseFloat(anyAmt[0][1].replace(/\s/g,'').replace(/\./g,'').replace(',','.'));
        }
      }
    }

    // ZINSEN/DIVIDENDEN entries with negative amounts are Kapitalertragsteuer/Soli
    // deductions — NOT income. Skip them so only the net credit (+) is imported.
    if (/ZINSEN|DIVIDENDEN/i.test(txType) && amt < 0) continue;

    // ── Build search text for TAX_RULES + PROP_ALIASES ──
    const fullBlock = [...blockLines, vzweck].join(' ');
    const name = payee.substring(0, 80);
    const desc = `${txType} · ${payee}${vzweck ? ' · ' + vzweck : ''}`.substring(0, 200);

    // Detect property
    let detectedProp = null;
    for (const alias of PROP_ALIASES) {
      if (alias.pattern.test(fullBlock)) { detectedProp = alias; break; }
    }

    // Apply TAX_RULES
    let matched = false;
    for (const rule of TAX_RULES) {
      if (rule.pattern.test(fullBlock)) {
        const sId = detectedProp ? detectedProp.sectionId : rule.sectionId;
        const tId = detectedProp ? detectedProp.typeId    : rule.typeId;
        txs.push({
          id: uid(), date: lastDate, name, desc, amt,
          taxLabel:     rule.label + (detectedProp ? ` · ${detectedProp.propName}` : ''),
          taxSectionId: sId, taxTypeId: tId,
          detectedPropId: detectedProp?.propId || null,
          detectedPropName: detectedProp?.propName || null,
          needsReview:  rule.needsReview && !detectedProp,
          accepted: true
        });
        matched = true;
        break;
      }
    }
    if (!matched && detectedProp) {
      txs.push({
        id: uid(), date: lastDate, name, desc, amt,
        taxLabel:     `${detectedProp.propName} — Transaktion`,
        taxSectionId: detectedProp.sectionId, taxTypeId: detectedProp.typeId,
        detectedPropId: detectedProp.propId || null,
        detectedPropName: detectedProp.propName,
        needsReview: false, accepted: true
      });
    }
  }

  // Deduplicate
  const seen = new Set();
  return txs.filter(t => {
    const key = `${t.date}|${t.name}|${t.amt}`;
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });
}

function renderImportResults() {
  const el = document.getElementById('import-results');
  if (!el) return;
  if (importResults.length === 0) { el.innerHTML = ''; return; }

  const eurFmt    = n => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(n);
  const autoItems = importResults.filter(t => t.accepted);
  const manItems  = importResults.filter(t => !t.accepted);
  const reviewCnt = autoItems.filter(t => t.needsReview).length;
  const saveCnt   = importResults.filter(t => t.accepted).length;

  const rowHtml = (t, i, isManual) => {
    const amtColor = t.amt >= 0 ? 'var(--green)' : 'var(--red)';
    const sign     = t.amt >= 0 ? '+' : '';
    const dateStr  = t.date ? t.date.split('-').reverse().join('.') : '–';
    const labelCol = t.needsReview ? '#FF9500' : (isManual ? 'var(--gray1)' : 'var(--blue)');
    const rowBg    = t.needsReview ? 'background:#FFFBF0;' : (isManual ? 'background:#F9F9F9;' : '');
    return `
      <div class="import-tx-row" style="${rowBg}">
        <input type="checkbox" ${t.accepted?'checked':''} onchange="toggleImport(${i},this.checked)"
          style="width:20px;height:20px;margin-top:3px;flex-shrink:0;cursor:pointer;accent-color:var(--blue)">
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.name)}</div>
          <div style="font-size:12px;color:var(--gray1);margin-top:2px">${dateStr}${t.taxLabel!=='—'?` · <span style="color:${labelCol};font-weight:600">${t.needsReview?'⚠️ ':''}${t.taxLabel}</span>`:''}</div>
          ${t.desc && t.desc !== t.name ? `<div style="font-size:11px;color:var(--gray2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.desc.substring(0,80))}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:8px">
          <div style="font-size:14px;font-weight:700;color:${amtColor}">${sign}${eurFmt(t.amt)}</div>
          <button onclick="removeImportItem(${i})" style="background:none;border:none;font-size:11px;color:var(--gray2);cursor:pointer;padding:0">✕</button>
        </div>
      </div>`;
  };

  let html = `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px 4px">
      <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--gray1)">
        ${autoItems.length} erkannt · ${manItems.length} weitere
      </div>
      <button onclick="clearImportResults()" style="background:none;border:none;font-size:13px;color:var(--red);font-weight:600;padding:4px 8px;cursor:pointer">✕ Alle löschen</button>
    </div>`;

  if (reviewCnt > 0) {
    html += `<div style="margin:0 16px 8px;background:#FFF8E1;border-radius:10px;padding:10px 12px;font-size:12px;color:#856404;border-left:4px solid #FFC107">
      ⚠️ <strong>Bitte prüfen:</strong> Nur anhaken wenn wirklich für eine vermietete Wohnung/Garage.
    </div>`;
  }

  if (autoItems.length > 0) {
    html += `<div class="sec-hdr" style="padding-top:4px">✅ Automatisch erkannt</div><div class="card">`;
    autoItems.forEach((t) => { const i = importResults.indexOf(t); html += rowHtml(t, i, false); });
    html += `</div>`;
  }

  if (manItems.length > 0) {
    html += `<div class="sec-hdr" style="padding-top:8px">📋 Alle Buchungen — manuell auswählen</div>
    <div style="margin:0 16px 8px;background:#EEF5FF;border-radius:10px;padding:9px 12px;font-size:12px;color:#1D4ED8">
      Haken setzen bei Buchungen die steuerrelevant sind
    </div>
    <div class="card">`;
    manItems.forEach((t) => { const i = importResults.indexOf(t); html += rowHtml(t, i, true); });
    html += `</div>`;
  }

  html += `<button class="save-btn" id="import-save-btn" style="margin-top:12px" onclick="saveImportedTxs()">
    💾 ${saveCnt} Belege speichern
  </button>`;
  el.innerHTML = html;
}

function toggleImport(idx, checked) {
  if (importResults[idx]) importResults[idx].accepted = checked;
  // Update save button count without full re-render
  const btn = document.getElementById('import-save-btn');
  if (btn) btn.textContent = `💾 ${importResults.filter(t=>t.accepted).length} Belege speichern`;
}

function removeImportItem(idx) {
  importResults.splice(idx, 1);
  renderImportResults();
}

function clearImportResults() {
  importResults = [];
  renderImportResults();
}

function saveImportedTxs() {
  const toSave = importResults.filter(t => t.accepted);
  if (!toSave.length) { toast('⚠️ Keine Buchungen ausgewählt'); return; }
  const eurFmt = n => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(n);
  const newWTxs = wGetTxs();

  toSave.forEach(t => {
    const dateStr = t.date ? t.date.split('-').reverse().join('.') : '–';

    // Wohnungen transactions → save directly to imm_txs so financial dashboard works
    if (t.taxSectionId === 'wohnungen' || t.taxSectionId === 'garagen') {
      const fullText = (t.name||'') + ' ' + (t.desc||'');
      const pid = t.detectedPropId || detectPid(fullText);
      const isInc = t.amt >= 0;
      // Pick category from taxLabel
      const lbl = (t.taxLabel||'').toLowerCase();
      let cat;
      if (isInc) {
        cat = 'Kaltmiete';
      } else if (/hausgeld|hausverwalt|weg\b|monatsgeld/.test(lbl) || /hausgeld|weg\b/.test(fullText.toLowerCase())) {
        cat = 'Hausverwaltung';
      } else if (/grundsteuer/.test(lbl)) {
        cat = 'Grundsteuer';
      } else if (/reparatur|renovier|handwerk/.test(lbl)) {
        cat = 'Reparaturen / Instandhaltung';
      } else if (/versicherung/.test(lbl)) {
        cat = 'Gebäudeversicherung';
      } else {
        cat = 'Sonstige Werbungskosten';
      }
      newWTxs.push({
        id: uid(), pid: pid || null,
        type: isInc ? 'income' : 'expense',
        amt: Math.abs(t.amt),
        cat, desc: (t.desc && t.desc !== t.name) ? t.desc.substring(0, 200) : (t.name || ''),
        date: t.date || wToday(),
        inv: '', doc: null, docFileId: null
      });
    } else {
      // All other sections → save to brd_docs as before
      addDoc({
        id: uid(), year: currentYear,
        sectionId: t.taxSectionId, subsectionId: null, typeId: t.taxTypeId,
        title: `${t.name} – ${dateStr}`,
        notes: `${t.taxLabel} · ${t.amt>=0?'+':''}${eurFmt(t.amt)}${t.desc&&t.desc!==t.name?'\n'+t.desc:''}`,
        files: [], createdAt: Date.now(), modifiedAt: Date.now(),
        amt: t.amt, date: t.date
      });
    }
  });

  wSaveTxs(newWTxs);
  importResults = [];
  toast(`✅ ${toSave.length} Belege gespeichert`);
  setTimeout(() => goTab('overview'), 800);
}

initDB()
  .then(() => {
    migrateWohnungenDocs(); // move any wohnungen brd_docs → imm_txs
    document.getElementById('ov-year').textContent = currentYear;
    renderOverview();
    renderExport();
  })
  .catch(err => {
    console.error('DB init:', err);
    renderOverview();
  });

  // ── Service Worker (offline support) ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

// ════════════════════════════════════════════
//  BACKUP & RESTORE
// ════════════════════════════════════════════

function doResetAll() {
  if (!confirm('⚠️ ACHTUNG: Alle Belege und Buchungen werden gelöscht!\n\nHaben Sie ein aktuelles Backup?\n\nFortfahren?')) return;
  if (!confirm('Wirklich alle Daten löschen? Diese Aktion kann nicht rückgängig gemacht werden.')) return;
  localStorage.removeItem('brd_docs');
  localStorage.removeItem('imm_txs');
  toast('🗑️ Alle Daten gelöscht — bitte neu importieren');
  setTimeout(() => { renderOverview(); renderExport(); }, 800);
}

async function doBackup() {
  toast('⏳ Backup wird erstellt…');
  try {
    // 1. collect all file records from IndexedDB
    const fileRecords = await new Promise((res, rej) => {
      const tx  = db.transaction('files', 'readonly');
      const req = tx.objectStore('files').getAll();
      req.onsuccess = () => res(req.result);
      req.onerror   = () => rej(req.error);
    });

    // 2. convert ArrayBuffer data to base64 for JSON storage
    const filesB64 = fileRecords.map(r => ({
      id:   r.id,
      name: r.name,
      type: r.type,
      data: btoa(String.fromCharCode(...new Uint8Array(r.data)))
    }));

    // 3. assemble backup object
    const backup = {
      version:   1,
      createdAt: new Date().toISOString(),
      brd_docs:  getDocs(),
      imm_txs:   wGetTxs(),
      files:     filesB64
    };

    // 4. download as JSON file
    const json = JSON.stringify(backup);
    const blob = new Blob([json], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const date = new Date().toISOString().split('T')[0];
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `BRD_Steuer_Backup_${date}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    toast('✅ Backup gespeichert!');
  } catch(e) {
    toast('⚠️ Backup fehlgeschlagen: ' + e.message);
  }
}

async function doRestore(input) {
  const file = input.files[0];
  if (!file) return;
  if (!confirm('⚠️ Alle aktuellen Daten werden durch das Backup ersetzt. Fortfahren?')) {
    input.value = ''; return;
  }
  try {
    toast('⏳ Backup wird wiederhergestellt…');
    const text   = await file.text();
    const backup = JSON.parse(text);
    if (!backup.version || !backup.brd_docs || !backup.imm_txs) {
      toast('⚠️ Ungültige Backup-Datei'); input.value=''; return;
    }

    // restore localStorage
    saveDocs(backup.brd_docs);
    wSaveTxs(backup.imm_txs);

    // restore files to IndexedDB
    for (const r of (backup.files || [])) {
      const bytes = Uint8Array.from(atob(r.data), c => c.charCodeAt(0));
      await dbPut(r.id, bytes.buffer, r.type, r.name);
    }

    input.value = '';
    toast('✅ Backup erfolgreich wiederhergestellt!');
    renderOverview();
  } catch(e) {
    toast('⚠️ Fehler beim Wiederherstellen: ' + e.message);
    input.value = '';
  }
}
</script>
